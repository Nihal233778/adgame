<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Trivia · Telegram Mini App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #121826 0%, #1e2433 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #eef2f6;
        }
        
        .app-container {
            max-width: 480px;
            width: 100%;
            background: rgba(20, 28, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(100, 150, 255, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(100, 150, 255, 0.1) inset;
            padding: 24px 20px;
            position: relative;
            overflow: hidden;
        }
        
        .app-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(80, 140, 255, 0.08), transparent 60%);
            z-index: -1;
        }
        
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #5c8cff, #9d6eff);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 12px rgba(92, 140, 255, 0.4);
        }
        
        .logo-text {
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #c5d9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .badge {
            background: rgba(92, 140, 255, 0.15);
            padding: 6px 12px;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(92, 140, 255, 0.3);
            color: #b8ceff;
        }
        
        .stats-panel {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-item {
            flex: 1;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 16px 10px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
        }
        
        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #5c8cff;
            line-height: 1.2;
            text-shadow: 0 2px 5px rgba(92, 140, 255, 0.3);
        }
        
        .stat-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            margin-top: 4px;
        }
        
        .game-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 28px;
            padding: 24px 18px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            box-shadow: 0 10px 20px -10px rgba(0, 0, 0, 0.5);
        }
        
        .question-area {
            text-align: center;
            margin-bottom: 28px;
        }
        
        .question-label {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.5;
            margin-bottom: 12px;
        }
        
        .brand-slogan {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #d6e4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            line-height: 1.3;
            padding: 0 10px;
        }
        
        .hint-text {
            font-size: 16px;
            font-style: italic;
            opacity: 0.6;
            color: #a0b8e0;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 24px 0;
        }
        
        .option-button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(92, 140, 255, 0.25);
            border-radius: 18px;
            padding: 18px 8px;
            font-size: 18px;
            font-weight: 500;
            color: #eef2f6;
            cursor: pointer;
            transition: all 0.15s ease;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        
        .option-button:hover {
            background: rgba(92, 140, 255, 0.15);
            transform: translateY(-2px);
            border-color: #5c8cff;
        }
        
        .option-button:active {
            transform: translateY(0);
        }
        
        .option-button.correct {
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
            color: #d0f0d0;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
        }
        
        .option-button.wrong {
            background: rgba(231, 76, 60, 0.2);
            border-color: #e74c3c;
            color: #ffd5d5;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.2);
        }
        
        .option-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .message-container {
            min-height: 60px;
            padding: 14px 18px;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 40px;
            margin: 20px 0 16px;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(92, 140, 255, 0.15);
            backdrop-filter: blur(5px);
            text-align: center;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        
        .primary-action {
            flex: 1;
            background: linear-gradient(145deg, #5c8cff, #3f6ad0);
            border: none;
            padding: 16px 0;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #2a3f7a;
            transition: all 0.08s linear;
            border: 1px solid #8ab0ff;
        }
        
        .primary-action:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #2a3f7a;
        }
        
        .primary-action:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 8px 0 #2a3f7a;
            pointer-events: none;
        }
        
        .secondary-action {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(92, 140, 255, 0.4);
            padding: 16px 0;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 600;
            color: #b8ceff;
            cursor: pointer;
            transition: 0.08s linear;
            backdrop-filter: blur(5px);
        }
        
        .secondary-action:active {
            background: rgba(92, 140, 255, 0.15);
        }
        
        .footer-info {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            opacity: 0.5;
        }
        
        .tracking-badge {
            font-size: 10px;
            background: rgba(92, 140, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #8aacff;
            word-break: break-all;
        }
        
        .status-note {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 8px;
            text-align: center;
        }
        
        .privacy-link {
            color: #8aacff;
            text-decoration: none;
        }
        
        .privacy-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🎯</div>
                <span class="logo-text">brand trivia</span>
            </div>
            <div class="badge">tg mini app</div>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-number" id="scoreValue">0</div>
                <div class="stat-label">score</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="roundValue">1/8</div>
                <div class="stat-label">round</div>
            </div>
        </div>
        
        <div class="game-card">
            <div class="question-area">
                <div class="question-label">which brand's slogan?</div>
                <div class="brand-slogan" id="sloganDisplay">Loading...</div>
                <div class="hint-text" id="hintDisplay">select the correct brand</div>
            </div>
            
            <div class="options-grid" id="optionsGrid">
                <!-- Options will be injected here -->
            </div>
            
            <div id="feedbackMessage" class="message-container">🎮 choose an answer to begin</div>
            
            <div class="button-group">
                <button class="primary-action" id="nextButton" disabled>next round</button>
                <button class="secondary-action" id="restartButton">new game</button>
            </div>
        </div>
        
        <div class="footer-info">
            <span>© 2026 · version 1.0</span>
            <span id="paramDisplay" class="tracking-badge">no tracking param</span>
            <a href="#" id="policyLink" class="privacy-link" target="_blank">privacy</a>
        </div>
        
        <div id="conversionStatus" class="status-note"></div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script>
        (function() {
            // ---------- PARAMETER EXTRACTION (for any ad network) ----------
            // Expected format: ?startapp=CAMPAIGN_ID or ?startapp=click_ID
            // Can be customized for any network
            
            let trackingParam = null;
            let conversionSent = false;
            
            function extractTrackingParameter() {
                try {
                    // Check Telegram WebApp data (standard for Mini Apps)
                    if (window.Telegram?.WebApp?.initDataUnsafe?.start_param) {
                        const startParam = window.Telegram.WebApp.initDataUnsafe.start_param;
                        console.log('Telegram start_param:', startParam);
                        
                        if (startParam) {
                            trackingParam = startParam;
                            return;
                        }
                    }
                    
                    // Check URL parameters
                    const urlParams = new URLSearchParams(window.location.search);
                    const tgWebAppData = urlParams.get('tgWebAppData');
                    
                    if (tgWebAppData) {
                        const params = new URLSearchParams(tgWebAppData);
                        const startParam = params.get('start_param');
                        
                        if (startParam) {
                            trackingParam = startParam;
                            return;
                        }
                    }
                    
                    // Check hash
                    if (window.location.hash && window.location.hash.length > 1) {
                        trackingParam = window.location.hash.substring(1);
                        return;
                    }
                    
                    console.log('No tracking parameter found - running in test mode');
                } catch (e) {
                    console.error('Error extracting parameter:', e);
                }
            }
            
            // Extract tracking parameter
            extractTrackingParameter();
            
            // Display parameter in footer
            const paramDisplay = document.getElementById('paramDisplay');
            if (paramDisplay) {
                if (trackingParam) {
                    const shortParam = trackingParam.length > 12 
                        ? trackingParam.substring(0, 10) + '...' 
                        : trackingParam;
                    paramDisplay.textContent = `param: ${shortParam}`;
                } else {
                    paramDisplay.textContent = '⚡ test mode';
                }
            }
            
            // ---------- CONVERSION TRACKING (customize for your network) ----------
            function sendConversion() {
                if (!trackingParam) {
                    console.log('No tracking parameter - test mode');
                    document.getElementById('conversionStatus').textContent = '🧪 test mode (no tracking)';
                    return false;
                }
                
                if (conversionSent) {
                    console.log('Conversion already sent');
                    return false;
                }
                
                // ===== CUSTOMIZE THIS URL FOR YOUR AD NETWORK =====
                // Replace with your actual conversion endpoint
                // Examples:
                // - https://go.yournetwork.com/conversion?click_id=PARAM
                // - https://api.tracking.com/convert?clickid=PARAM
                // - https://yourdomain.com/track?param=PARAM
                
                const conversionUrl = `https://your-conversion-endpoint.com/convert?click_id=${encodeURIComponent(trackingParam)}`;
                
                // For testing/demo purposes - remove in production
                console.log('Would send conversion to:', conversionUrl);
                
                // Uncomment for actual implementation:
                /*
                if (navigator.sendBeacon) {
                    const success = navigator.sendBeacon(conversionUrl);
                    if (success) {
                        console.log('Conversion sent via sendBeacon');
                        conversionSent = true;
                        document.getElementById('conversionStatus').textContent = '✓ conversion sent';
                        return true;
                    }
                }
                
                fetch(conversionUrl, {
                    method: 'GET',
                    mode: 'no-cors',
                    keepalive: true
                }).then(() => {
                    console.log('Conversion sent via fetch');
                    conversionSent = true;
                    document.getElementById('conversionStatus').textContent = '✓ conversion sent';
                }).catch(err => {
                    console.error('Failed to send conversion:', err);
                    document.getElementById('conversionStatus').textContent = '✗ conversion failed';
                });
                */
                
                // Demo mode - simulate success
                document.getElementById('conversionStatus').textContent = '✓ conversion ready (demo)';
                conversionSent = true;
                
                return true;
            }
            
            // ---------- GAME DATA ----------
            const quizData = [
                { brand: "Nike", slogan: "Just Do It", options: ["Nike", "Adidas", "Puma", "Reebok"] },
                { brand: "Apple", slogan: "Think Different", options: ["Apple", "Microsoft", "Google", "Samsung"] },
                { brand: "McDonald's", slogan: "I'm Lovin' It", options: ["McDonald's", "Burger King", "Wendy's", "KFC"] },
                { brand: "Coca-Cola", slogan: "Taste the Feeling", options: ["Coca-Cola", "Pepsi", "Dr Pepper", "Fanta"] },
                { brand: "Amazon", slogan: "From A to Z", options: ["Amazon", "eBay", "Walmart", "Target"] },
                { brand: "Netflix", slogan: "See What's Next", options: ["Netflix", "Hulu", "Disney+", "HBO"] },
                { brand: "Spotify", slogan: "Music for Everyone", options: ["Spotify", "Apple Music", "Tidal", "Deezer"] },
                { brand: "Tesla", slogan: "Accelerate the World", options: ["Tesla", "Toyota", "Ford", "BMW"] }
            ];
            
            // Game state
            let currentIndex = 0;
            let playerScore = 0;
            let roundAnswered = false;
            let gameFinished = false;
            
            // DOM elements
            const sloganEl = document.getElementById('sloganDisplay');
            const hintEl = document.getElementById('hintDisplay');
            const optionsEl = document.getElementById('optionsGrid');
            const feedbackEl = document.getElementById('feedbackMessage');
            const scoreEl = document.getElementById('scoreValue');
            const roundEl = document.getElementById('roundValue');
            const nextBtn = document.getElementById('nextButton');
            const restartBtn = document.getElementById('restartButton');
            const statusEl = document.getElementById('conversionStatus');
            
            // Utility: shuffle array
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }
            
            // Load a specific round
            function loadRound(index) {
                if (index >= quizData.length) {
                    // Game completed
                    gameFinished = true;
                    sloganEl.textContent = "🎉 GAME COMPLETE!";
                    hintEl.textContent = `final score: ${playerScore}/${quizData.length}`;
                    
                    optionsEl.innerHTML = `
                        <div style="grid-column: span 2; text-align: center; padding: 30px; background: rgba(92,140,255,0.1); border-radius: 20px;">
                            <div style="font-size: 48px; margin-bottom: 10px;">🏆</div>
                            <div style="font-size: 24px; font-weight: bold;">${playerScore} / ${quizData.length}</div>
                            <div style="margin-top: 15px; opacity: 0.7;">thanks for playing!</div>
                        </div>
                    `;
                    
                    nextBtn.disabled = true;
                    
                    // Send conversion on game completion (target action)
                    if (!conversionSent) {
                        sendConversion();
                    }
                    
                    return;
                }
                
                const currentQuiz = quizData[index];
                sloganEl.textContent = `"${currentQuiz.slogan}"`;
                hintEl.textContent = 'select the brand that uses this slogan';
                roundEl.textContent = `${index + 1}/${quizData.length}`;
                
                // Shuffle options
                const shuffledOptions = shuffleArray([...currentQuiz.options]);
                
                // Create buttons
                let htmlString = '';
                shuffledOptions.forEach(option => {
                    htmlString += `<button class="option-button" data-brand="${option}">${option}</button>`;
                });
                optionsEl.innerHTML = htmlString;
                
                // Reset round state
                roundAnswered = false;
                nextBtn.disabled = true;
                
                // Attach click handlers
                document.querySelectorAll('.option-button').forEach(btn => {
                    btn.addEventListener('click', (e) => handleSelection(e, currentQuiz.brand));
                });
            }
            
            // Handle answer selection
            function handleSelection(event, correctBrand) {
                if (roundAnswered || gameFinished) return;
                
                const selectedBtn = event.currentTarget;
                const selectedBrand = selectedBtn.dataset.brand;
                
                roundAnswered = true;
                
                // Disable all options
                document.querySelectorAll('.option-button').forEach(btn => {
                    btn.disabled = true;
                });
                
                // Check if correct
                const isAnswerCorrect = (selectedBrand === correctBrand);
                
                // Mark correct and wrong
                document.querySelectorAll('.option-button').forEach(btn => {
                    if (btn.dataset.brand === correctBrand) {
                        btn.classList.add('correct');
                    } else if (btn === selectedBtn && !isAnswerCorrect) {
                        btn.classList.add('wrong');
                    }
                });
                
                // Update score and feedback
                if (isAnswerCorrect) {
                    playerScore++;
                    feedbackEl.textContent = '✅ CORRECT! Well done!';
                    feedbackEl.style.color = '#a5d6a5';
                } else {
                    feedbackEl.textContent = `❌ Incorrect. The answer is ${correctBrand}`;
                    feedbackEl.style.color = '#ffb3b3';
                }
                
                scoreEl.textContent = playerScore;
                
                // Enable next button
                nextBtn.disabled = false;
            }
            
            // Move to next round
            function advanceRound() {
                if (gameFinished) return;
                
                currentIndex++;
                loadRound(currentIndex);
                feedbackEl.textContent = '🎯 choose your answer';
                feedbackEl.style.color = '#eef2f6';
            }
            
            // Restart game
            function restartGame() {
                currentIndex = 0;
                playerScore = 0;
                gameFinished = false;
                roundAnswered = false;
                conversionSent = false; // Reset for new game
                
                scoreEl.textContent = '0';
                statusEl.textContent = '';
                
                // Shuffle quiz order for variety
                shuffleArray(quizData);
                
                loadRound(0);
                feedbackEl.textContent = '🎮 choose an answer to begin';
                feedbackEl.style.color = '#eef2f6';
            }
            
            // Event listeners
            nextBtn.addEventListener('click', advanceRound);
            restartBtn.addEventListener('click', restartGame);
            
            // Telegram Mini App initialization
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
                
                // Set theme colors if needed
                document.documentElement.style.setProperty('--tg-theme-bg-color', window.Telegram.WebApp.backgroundColor);
            }
            
            // Start the game
            restartGame();
            
            // Optional: send conversion after 30 seconds of engagement
            setTimeout(() => {
                if (!conversionSent && trackingParam && !gameFinished) {
                    // User engaged but didn't finish - uncomment if desired
                    // sendConversion();
                }
            }, 30000);
            
            // Update privacy link - REPLACE WITH YOUR ACTUAL PRIVACY PAGE
            document.getElementById('policyLink').href = '#'; // Change to your real URL
        })();
    </script>
</body>
</html>
