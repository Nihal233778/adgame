  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Trivia · Telegram Mini App</title>
    
    <!-- Telegram Web App Script (required) -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    
    <!-- Adexium Ad Script -->
    <script type="text/javascript" src="https://cdn.tgads.space/assets/js/adexium-widget.min.js"></script>
    <script type="text/javascript">
        // Initialize the Adexium widget and make it globally available
        document.addEventListener('DOMContentLoaded', () => {
            try {
                window.adexiumWidget = new AdexiumWidget({
                    wid: '2ef254d8-d5e4-4479-a85f-bc19348d2c56',
                    adFormat: 'interstitial' // Change to 'rewarded' if you have that format
                });
                // Enable auto mode (ads will appear automatically)
                if (window.adexiumWidget.autoMode) {
                    window.adexiumWidget.autoMode();
                }
                console.log('✅ Adexium widget initialized');
            } catch (e) {
                console.error('❌ Adexium initialization failed:', e);
            }
        });
    </script>
    
    <style>
        /* (all your existing styles – keep them) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(145deg, #121826 0%, #1e2433 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            color: #eef2f6;
        }
        .app-container {
            max-width: 480px;
            width: 100%;
            background: rgba(20, 28, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(100, 150, 255, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            padding: 24px 20px;
        }
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-icon {
            width: 38px; height: 38px; background: linear-gradient(135deg, #5c8cff, #9d6eff);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 18px; color: white;
        }
        .logo-text {
            font-size: 20px; font-weight: 600; background: linear-gradient(135deg, #fff, #c5d9ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .badge {
            background: rgba(92, 140, 255, 0.15); padding: 6px 12px; border-radius: 100px;
            font-size: 12px; border: 1px solid rgba(92, 140, 255, 0.3); color: #b8ceff;
        }
        .stats-panel { display: flex; gap: 16px; margin-bottom: 24px; }
        .stat-item {
            flex: 1; background: rgba(0, 0, 0, 0.25); border-radius: 20px; padding: 16px 10px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .stat-number { font-size: 32px; font-weight: 700; color: #5c8cff; }
        .stat-label { font-size: 12px; text-transform: uppercase; opacity: 0.6; }
        .game-card {
            background: rgba(0, 0, 0, 0.2); border-radius: 28px; padding: 24px 18px;
            margin-bottom: 20px; border: 1px solid rgba(255, 255, 255, 0.02);
        }
        .question-area { text-align: center; margin-bottom: 28px; }
        .question-label {
            font-size: 14px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5;
            margin-bottom: 12px;
        }
        .brand-slogan {
            font-size: 32px; font-weight: 700; background: linear-gradient(135deg, #fff, #d6e4ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .hint-text { font-size: 16px; font-style: italic; opacity: 0.6; color: #a0b8e0; }
        .options-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 24px 0;
        }
        .option-button {
            background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(92, 140, 255, 0.25);
            border-radius: 18px; padding: 18px 8px; font-size: 18px; font-weight: 500;
            color: #eef2f6; cursor: pointer; transition: all 0.15s ease;
        }
        .option-button:hover {
            background: rgba(92, 140, 255, 0.15); transform: translateY(-2px);
            border-color: #5c8cff;
        }
        .option-button.correct {
            background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; color: #d0f0d0;
            pointer-events: none;
        }
        .option-button.wrong {
            background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; color: #ffd5d5;
            pointer-events: none;
        }
        .message-container {
            min-height: 60px; padding: 14px 18px; background: rgba(0, 0, 0, 0.25);
            border-radius: 40px; margin: 20px 0 16px; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(92, 140, 255, 0.15); text-align: center;
        }
        .ad-buttons-section { margin: 20px 0; display: flex; flex-direction: column; gap: 12px; }
        .ad-button {
            background: linear-gradient(145deg, #f4a261, #e76f51); border: none;
            padding: 16px 20px; border-radius: 40px; font-size: 16px; font-weight: 600;
            color: white; cursor: pointer; box-shadow: 0 6px 0 #b96f2e;
            transition: all 0.08s linear; border: 1px solid #ffb085;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .ad-button:active { transform: translateY(4px); box-shadow: 0 2px 0 #b96f2e; }
        .button-group { display: flex; gap: 12px; margin-top: 16px; }
        .primary-action {
            flex: 1; background: linear-gradient(145deg, #5c8cff, #3f6ad0); border: none;
            padding: 16px 0; border-radius: 40px; font-size: 18px; font-weight: 600;
            color: white; cursor: pointer; box-shadow: 0 8px 0 #2a3f7a;
            transition: 0.08s linear; border: 1px solid #8ab0ff;
        }
        .primary-action:active { transform: translateY(6px); box-shadow: 0 2px 0 #2a3f7a; }
        .primary-action:disabled { opacity: 0.5; pointer-events: none; }
        .secondary-action {
            flex: 1; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(92, 140, 255, 0.4);
            padding: 16px 0; border-radius: 40px; font-size: 18px; font-weight: 600;
            color: #b8ceff; cursor: pointer; transition: 0.08s linear;
        }
        .secondary-action:active { background: rgba(92, 140, 255, 0.15); }
        .footer-info {
            margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; justify-content: space-between; font-size: 12px; opacity: 0.5;
        }
        .tracking-badge {
            font-size: 10px; background: rgba(92, 140, 255, 0.1); padding: 4px 8px;
            border-radius: 4px; font-family: monospace; color: #8aacff;
        }
        .status-note { font-size: 11px; opacity: 0.5; margin-top: 8px; text-align: center; }
        .privacy-link { color: #8aacff; text-decoration: none; }
        .ad-label {
            font-size: 12px; text-align: center; margin: 10px 0 5px; color: #f4a261;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🎯</div>
                <span class="logo-text">brand trivia</span>
            </div>
            <div class="badge">tg mini app</div>
        </div>
        
        <div class="stats-panel">
            <div class="stat-item">
                <div class="stat-number" id="scoreValue">0</div>
                <div class="stat-label">score</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="roundValue">1/8</div>
                <div class="stat-label">round</div>
            </div>
        </div>
        
        <div class="game-card">
            <div class="question-area">
                <div class="question-label">which brand's slogan?</div>
                <div class="brand-slogan" id="sloganDisplay">Loading...</div>
                <div class="hint-text" id="hintDisplay">select the correct brand</div>
            </div>
            
            <div class="options-grid" id="optionsGrid"></div>
            
            <div id="feedbackMessage" class="message-container">🎮 choose an answer to begin</div>
            
            <div class="ad-label">🎬 WATCH ADS FOR BONUSES</div>
            <div class="ad-buttons-section">
                <button class="ad-button" id="watchAdForHintBtn"><i>🔍</i> Watch Ad to Reveal First Letter</button>
                <button class="ad-button" id="watchAdForBonusBtn"><i>⭐</i> Watch Ad to Double Points</button>
                <button class="ad-button" id="watchAdForSkipBtn"><i>🔄</i> Watch Ad to Skip This Question</button>
            </div>
            
            <div class="button-group">
                <button class="primary-action" id="nextButton" disabled>next round</button>
                <button class="secondary-action" id="restartButton">new game</button>
            </div>
        </div>
        
        <div class="footer-info">
            <span>© 2026 · version 1.0</span>
            <span id="paramDisplay" class="tracking-badge">no tracking param</span>
            <a href="#" id="policyLink" class="privacy-link" target="_blank">privacy</a>
        </div>
        <div id="conversionStatus" class="status-note"></div>
    </div>
    
    <script>
        (function() {
            // ==================== ADEXIUM SETUP ====================
            let adexiumWidget = null;
            let pendingReward = null;
            let adTimeout = null;
            let widgetReady = false;
            
            // Wait for widget to be initialized (check every 500ms)
            function checkWidget() {
                if (window.adexiumWidget) {
                    adexiumWidget = window.adexiumWidget;
                    widgetReady = true;
                    console.log('✅ Adexium widget ready');
                    // Set up event listeners for ad completion
                    const eventNames = ['adCompleted', 'onAdCompleted', 'close', 'onClose', 'finished', 'reward'];
                    eventNames.forEach(ev => {
                        if (adexiumWidget.on && typeof adexiumWidget.on === 'function') {
                            adexiumWidget.on(ev, () => {
                                console.log(`Ad event: ${ev}`);
                                if (pendingReward) {
                                    pendingReward();
                                    pendingReward = null;
                                    if (adTimeout) clearTimeout(adTimeout);
                                    document.getElementById('feedbackMessage').textContent = '✨ Thanks for watching!';
                                    sendConversion();
                                }
                            });
                        } else if (adexiumWidget.addEventListener) {
                            adexiumWidget.addEventListener(ev, () => {
                                console.log(`Ad event: ${ev}`);
                                if (pendingReward) {
                                    pendingReward();
                                    pendingReward = null;
                                    if (adTimeout) clearTimeout(adTimeout);
                                    document.getElementById('feedbackMessage').textContent = '✨ Thanks for watching!';
                                    sendConversion();
                                }
                            });
                        }
                    });
                } else {
                    setTimeout(checkWidget, 500);
                }
            }
            checkWidget();
            
            // ==================== TRACKING ====================
            let trackingParam = null;
            let conversionSent = false;
            
            function extractTrackingParameter() {
                try {
                    if (window.Telegram?.WebApp?.initDataUnsafe?.start_param) {
                        trackingParam = window.Telegram.WebApp.initDataUnsafe.start_param;
                    }
                } catch (e) {}
                if (!trackingParam) {
                    const urlParams = new URLSearchParams(window.location.search);
                    const tgWebAppData = urlParams.get('tgWebAppData');
                    if (tgWebAppData) {
                        const params = new URLSearchParams(tgWebAppData);
                        trackingParam = params.get('start_param');
                    }
                }
            }
            extractTrackingParameter();
            
            const paramDisplay = document.getElementById('paramDisplay');
            if (paramDisplay) {
                paramDisplay.textContent = trackingParam ? `param: ${trackingParam.substring(0,10)}...` : '⚡ test mode';
            }
            
            function sendConversion() {
                if (!trackingParam || conversionSent) return;
                const url = `https://adexium.io/conversion?click_id=${encodeURIComponent(trackingParam)}`;
                if (navigator.sendBeacon) {
                    navigator.sendBeacon(url);
                } else {
                    fetch(url, { method: 'GET', mode: 'no-cors', keepalive: true });
                }
                conversionSent = true;
                document.getElementById('conversionStatus').textContent = '✓ conversion sent';
            }
            
            // ==================== GAME DATA ====================
            const quizData = [
                { brand: "Nike", slogan: "Just Do It", options: ["Nike", "Adidas", "Puma", "Reebok"] },
                { brand: "Apple", slogan: "Think Different", options: ["Apple", "Microsoft", "Google", "Samsung"] },
                { brand: "McDonald's", slogan: "I'm Lovin' It", options: ["McDonald's", "Burger King", "Wendy's", "KFC"] },
                { brand: "Coca-Cola", slogan: "Taste the Feeling", options: ["Coca-Cola", "Pepsi", "Dr Pepper", "Fanta"] },
                { brand: "Amazon", slogan: "From A to Z", options: ["Amazon", "eBay", "Walmart", "Target"] },
                { brand: "Netflix", slogan: "See What's Next", options: ["Netflix", "Hulu", "Disney+", "HBO"] },
                { brand: "Spotify", slogan: "Music for Everyone", options: ["Spotify", "Apple Music", "Tidal", "Deezer"] },
                { brand: "Tesla", slogan: "Accelerate the World", options: ["Tesla", "Toyota", "Ford", "BMW"] }
            ];
            
            let currentIndex = 0;
            let playerScore = 0;
            let roundAnswered = false;
            let gameFinished = false;
            let currentCorrectBrand = "";
            let nextRoundPoints = 1;
            
            const sloganEl = document.getElementById('sloganDisplay');
            const hintEl = document.getElementById('hintDisplay');
            const optionsEl = document.getElementById('optionsGrid');
            const feedbackEl = document.getElementById('feedbackMessage');
            const scoreEl = document.getElementById('scoreValue');
            const roundEl = document.getElementById('roundValue');
            const nextBtn = document.getElementById('nextButton');
            const restartBtn = document.getElementById('restartButton');
            const hintAdBtn = document.getElementById('watchAdForHintBtn');
            const bonusAdBtn = document.getElementById('watchAdForBonusBtn');
            const skipAdBtn = document.getElementById('watchAdForSkipBtn');
            
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }
            
            function loadRound(index) {
                if (index >= quizData.length) {
                    gameFinished = true;
                    sloganEl.textContent = "🎉 GAME COMPLETE!";
                    hintEl.textContent = `final score: ${playerScore}/${quizData.length}`;
                    optionsEl.innerHTML = `<div style="grid-column: span 2; text-align: center; padding: 30px;">🏆 ${playerScore} / ${quizData.length}<br>thanks for playing!</div>`;
                    nextBtn.disabled = true;
                    if (!conversionSent) sendConversion();
                    return;
                }
                const currentQuiz = quizData[index];
                currentCorrectBrand = currentQuiz.brand;
                sloganEl.textContent = `"${currentQuiz.slogan}"`;
                hintEl.textContent = 'select the brand that uses this slogan';
                roundEl.textContent = `${index + 1}/${quizData.length}`;
                
                const shuffledOptions = shuffleArray([...currentQuiz.options]);
                let html = '';
                shuffledOptions.forEach(opt => html += `<button class="option-button" data-brand="${opt}">${opt}</button>`);
                optionsEl.innerHTML = html;
                
                roundAnswered = false;
                nextBtn.disabled = true;
                nextRoundPoints = 1;
                
                document.querySelectorAll('.option-button').forEach(btn => {
                    btn.addEventListener('click', (e) => handleSelection(e, currentQuiz.brand));
                });
            }
            
            function handleSelection(event, correctBrand) {
                if (roundAnswered || gameFinished) return;
                const selectedBtn = event.currentTarget;
                const selectedBrand = selectedBtn.dataset.brand;
                roundAnswered = true;
                document.querySelectorAll('.option-button').forEach(btn => btn.disabled = true);
                
                const isCorrect = (selectedBrand === correctBrand);
                document.querySelectorAll('.option-button').forEach(btn => {
                    if (btn.dataset.brand === correctBrand) btn.classList.add('correct');
                    else if (btn === selectedBtn && !isCorrect) btn.classList.add('wrong');
                });
                
                if (isCorrect) {
                    playerScore += nextRoundPoints;
                    feedbackEl.textContent = nextRoundPoints > 1 ? `✅ CORRECT! +${nextRoundPoints} points (doubled!)` : '✅ CORRECT! Well done!';
                } else {
                    feedbackEl.textContent = `❌ Incorrect. The answer is ${correctBrand}`;
                }
                scoreEl.textContent = playerScore;
                nextBtn.disabled = false;
            }
            
            function advanceRound() {
                if (gameFinished) return;
                currentIndex++;
                loadRound(currentIndex);
                feedbackEl.textContent = '🎯 choose your answer';
            }
            
            function restartGame() {
                currentIndex = 0;
                playerScore = 0;
                gameFinished = false;
                roundAnswered = false;
                conversionSent = false;
                nextRoundPoints = 1;
                scoreEl.textContent = '0';
                shuffleArray(quizData);
                loadRound(0);
                feedbackEl.textContent = '🎮 choose an answer to begin';
            }
            
            // ==================== AD BUTTON HANDLERS ====================
            function requestAd(rewardCallback) {
                if (!widgetReady || !adexiumWidget) {
                    alert('Ad system not ready. Please wait a moment and try again.');
                    return;
                }
                
                if (pendingReward) {
                    pendingReward = null;
                    if (adTimeout) clearTimeout(adTimeout);
                }
                
                pendingReward = rewardCallback;
                feedbackEl.textContent = '⏳ Please wait for an ad to appear...';
                
                // Do NOT try to call show() – rely on autoMode to display ads
                // Set a timeout to avoid infinite waiting
                adTimeout = setTimeout(() => {
                    if (pendingReward) {
                        pendingReward = null;
                        feedbackEl.textContent = '⚠️ Ad timeout. Try again.';
                    }
                }, 30000);
            }
            
            hintAdBtn.addEventListener('click', () => {
                if (gameFinished || roundAnswered) {
                    alert('You cannot use hints now. Start a new game!');
                    return;
                }
                requestAd(() => {
                    const firstLetter = currentCorrectBrand[0];
                    feedbackEl.textContent = `🔍 HINT: The brand starts with "${firstLetter}"`;
                });
            });
            
            bonusAdBtn.addEventListener('click', () => {
                if (gameFinished) {
                    alert('Game finished. Start new game.');
                    return;
                }
                requestAd(() => {
                    nextRoundPoints = 2;
                    feedbackEl.textContent = '⭐ BONUS ACTIVATED! Next correct answer gives DOUBLE points!';
                });
            });
            
            skipAdBtn.addEventListener('click', () => {
                if (gameFinished || roundAnswered) {
                    alert('Cannot skip now.');
                    return;
                }
                requestAd(() => {
                    document.querySelectorAll('.option-button').forEach(btn => {
                        if (btn.dataset.brand === currentCorrectBrand) btn.click();
                    });
                });
            });
            
            // Game navigation
            nextBtn.addEventListener('click', advanceRound);
            restartBtn.addEventListener('click', restartGame);
            
            // Telegram init
            if (window.Telegram?.WebApp) {
                window.Telegram.WebApp.ready();
                window.Telegram.WebApp.expand();
            }
            
            restartGame();
            document.getElementById('policyLink').href = '#'; // Replace with your actual privacy URL
        })();
    </script>
</body>
</html>
